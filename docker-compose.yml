services:

  web:
    build: .
    container_name: ecommerce-app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    expose:
      - "8000"


  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - web
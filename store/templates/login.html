{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            rgba(0,0,0,.5),
            rgba(0,0,0,.5)),
            url("{% static 'images/background image login.jpg' %}");

            background-size:cover;
            background-position:center;
        }

        .login-box{
            width:450px;
            padding:40px;

            background:rgba(255,255,255,.15);
            backdrop-filter:blur(15px);

            border-radius:20px;
            color:white;
        }

        .login-box h2{
            text-align:center;
            margin-bottom:30px;
            font-size:35px;
        }

        .input-group{
            position:relative;
            margin-bottom:20px;
        }

        .input-group i{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#666;
        }

        .input-group input{
            width:100%;
            padding:14px 14px 14px 45px;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#ff6b3d;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#ff4b2b;
        }

    </style>
</head>
<body>

<div class="login-box">

    <h2>
        <i class="fas fa-user-circle"></i>
        Login
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text"
                   name="username"
                   placeholder="Enter Username">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password"
                   name="password"
                   placeholder="Enter Password">
        </div>

        <button type="submit" class="login-btn">
            <i class="fas fa-sign-in-alt"></i>
            Login
        </button>

    </form>

</div>

</body>
</html>

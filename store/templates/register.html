{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#667eea,#764ba2);
}

.register-container{
    width:900px;
    max-width:95%;
    display:flex;
    overflow:hidden;
    border-radius:25px;
    background:white;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.left-side{
    flex:1;
    background:url("{% static 'images/background-image.jpg' %}");
    background-size:cover;
    background-position:center;
    position:relative;
}

.left-side::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
}

.left-content{
    position:absolute;
    color:white;
    padding:40px;
    bottom:40px;
    z-index:2;
}

.left-content h1{
    font-size:42px;
}

.right-side{
    flex:1;
    padding:50px;
}

.right-side h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

.input-group input{
    width:100%;
    padding:14px 14px 14px 45px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

.register-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.register-btn:hover{
    background:#5563d8;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    text-decoration:none;
    color:#667eea;
    font-weight:bold;
}

@media(max-width:768px){

    .register-container{
        flex-direction:column;
    }

    .left-side{
        height:250px;
    }

}

</style>

</head>

<body>

<div class="register-container">

    <div class="left-side">

        <div class="left-content">

            <h1>Join TrendMart</h1>

            <p>Create your account and start shopping today.</p>

        </div>

    </div>

    <div class="right-side">

        <h2>
            <i class="fas fa-user-plus"></i>
            Create Account
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username">
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email Address">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password1" placeholder="Password">
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password2" placeholder="Confirm Password">
            </div>

            <button type="submit" class="register-btn">
                Create Account
            </button>

        </form>

       <div class="login-link">
        Already have an account?
        <a href="{% url 'accounts:login' %}">
        Login
        </a>
    </div>

    </div>

</div>

</body>
</html>
